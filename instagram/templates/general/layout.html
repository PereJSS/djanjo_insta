<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{% block head_title %}Titulo base{% endblock %}</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Custom navbar styles -->
    <style>
      .navbar-brand {
        font-size: 1.5rem;
      }
      .navbar-nav .nav-link {
        font-weight: 500;
        transition: color 0.2s ease-in-out;
      }
      .navbar-nav .nav-link:hover {
        color: var(--bs-primary) !important;
      }
      .navbar-nav .nav-link.active {
        color: var(--bs-primary) !important;
        border-bottom: 2px solid var(--bs-primary);
      }
      .dropdown-menu {
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      .dropdown-item {
        transition: all 0.2s ease-in-out;
      }
      .dropdown-item:hover {
        background-color: var(--bs-light);
        transform: translateX(2px);
      }
      body {
        padding-top: 76px; /* Space for sticky navbar */
      }
    </style>
  </head>
  <body>
    {% include 'includes/header.html' %}

    <main>
      {% include 'includes/mensajes.html' %} {% block content %} {% endblock %}
    </main>
    {% include 'includes/footer.html' %}

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
    <script>
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);

        if (parts.length === 2) {
          return parts.pop().split(";").shift();
        }

        return "";
      }

      const likeForms = document.querySelectorAll(".js-like-form");
      if (likeForms.length > 0) {
        likeForms.forEach((likeForm) => {
          likeForm.addEventListener("submit", (event) => {
            const nLikesSpan = likeForm.querySelector(".js-like-count");
            const likeHeart = likeForm.querySelector(".js-like-heart");
            const ajaxUrl = likeForm.dataset.ajaxUrl;
            const unlikedHeartClass =
              likeForm.dataset.unlikedHeartClass || "text-secondary";
            let nLikes = parseInt(nLikesSpan.innerHTML, 10);

            event.preventDefault();

            fetch(ajaxUrl, {
              method: "POST",
              headers: {
                "X-CSRFToken": getCookie("csrftoken"),
              },
            })
              .then((response) => {
                if (!response.ok) {
                  throw new Error("Like request failed");
                }

                return response.json();
              })
              .then((data) => {
                likeHeart.classList.remove(
                  "text-danger",
                  "text-secondary",
                  "text-white",
                );

                if (data.liked) {
                  nLikes += 1;
                  likeHeart.classList.add("text-danger");
                } else {
                  nLikes -= 1;
                  likeHeart.classList.add(unlikedHeartClass);
                }

                nLikesSpan.innerHTML = data.likes_count || nLikes;
              })
              .catch(() => {
                likeForm.submit();
              });
          });
        });
      }

      // Active navbar link highlighting
      document.addEventListener("DOMContentLoaded", function () {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll(
          ".navbar-nav .nav-link:not(.dropdown-toggle)",
        );

        navLinks.forEach((link) => {
          const href = link.getAttribute("href");

          // Exact match for home page
          if (currentPath === "/" && href === "/") {
            link.classList.add("active", "fw-bold");
          }
          // Partial match for other pages
          else if (
            currentPath !== "/" &&
            href !== "/" &&
            currentPath.startsWith(href)
          ) {
            link.classList.add("active", "fw-bold");
          }
        });
      });
    </script>
  </body>
</html>
